name: Build Mihomo RuleSet

on:
  push:
    paths:
      - "rule-set.yaml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.27/mihomo-linux-amd64-v1.19.27.gz -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo

      - name: Convert YAML -> MRS
        run: |
          ./mihomo convert-ruleset domain yaml rule-set.yaml rule.mrs

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add rule.mrs

          git diff --cached --quiet || git commit -m "auto: update rule.mrs"
          git push
